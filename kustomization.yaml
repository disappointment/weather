apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: weather
resources:
  - deploy/namespace.yaml
  - deploy/deployment.yaml
  - deploy/service.yaml
configMapGenerator:
  - name: weather-site
    files:
      - index.html
      - styles.css
      - weather.js
      - app.js
      - radar.js
      - favicon.svg
      - manifest.webmanifest
      - sw.js

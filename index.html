                aria-controls="icon-set-menu">
          <span class="sr-only">Weather icon style</span>
          <span class="icon-set-btn-icon" id="icon-set-btn-icon" aria-hidden="true"></span>
          <span id="icon-set-label">Illustrated</span>
        </button>
        <div id="icon-set-menu" class="icon-set-menu" role="listbox"
             aria-label="Weather icon style" hidden>
          <button type="button" role="option" data-icon-set="illustrated"><span class="icon-set-preview" aria-hidden="true"></span><span class="icon-set-name">Illustrated</span></button>
          <button type="button" role="option" data-icon-set="meteo"><span class="icon-set-preview" aria-hidden="true"></span><span class="icon-set-name">Meteocons</span></button>
          <button type="button" role="option" data-icon-set="meteoline"><span class="icon-set-preview" aria-hidden="true"></span><span class="icon-set-name">Meteocons Line</span></button>
          <button type="button" role="option" data-icon-set="emoji"><span class="icon-set-preview" aria-hidden="true"></span><span class="icon-set-name">Emoji</span></button>
          <button type="button" role="option" data-icon-set="vivid"><span class="icon-set-preview" aria-hidden="true"></span><span class="icon-set-name">Vivid</span></button>
          <button type="button" role="option" data-icon-set="lucide"><span class="icon-set-preview" aria-hidden="true"></span><span class="icon-set-name">Lucide</span></button>
          <button type="button" role="option" data-icon-set="tabler"><span class="icon-set-preview" aria-hidden="true"></span><span class="icon-set-name">Tabler</span></button>
          <button type="button" role="option" data-icon-set="wi"><span class="icon-set-preview" aria-hidden="true"></span><span class="icon-set-name">Weather Icons</span></button>
        </div>
      </div>
      <div class="model-control">
        <button id="model-btn" class="icon-set-btn" type="button"
                aria-haspopup="listbox" aria-expanded="false"
                aria-controls="model-menu" title="Forecast model">
          <span class="sr-only">Forecast model</span>
          <span id="model-label">Best match</span>
        </button>
        <div id="model-menu" class="icon-set-menu" role="listbox"
             aria-label="Forecast model" hidden></div>
      </div>
      <button id="scheme-btn" class="icon-btn scheme-btn" type="button"
              aria-label="Theme: Auto" title="Theme: Auto">
        <span class="scheme-glyph" aria-hidden="true">◐</span>
      </button>
      <button id="unit-btn" class="unit-toggle" aria-label="Toggle units">°F</button>
      <button id="pin-btn" class="icon-btn pin-btn" type="button"
              aria-label="Save this location" aria-pressed="false" title="Save this location">
        <svg class="pin-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 2.6l2.9 5.9 6.5.95-4.7 4.58 1.1 6.47L12 17.5l-5.8 3.05 1.1-6.47-4.7-4.58 6.5-.95z"/>
        </svg>
      </button>
    </header>

    <div id="saved-bar" class="saved-bar" role="list" aria-label="Saved locations" hidden></div>

    <section id="status" class="status" role="status" aria-live="polite"
             aria-atomic="true" hidden></section>

    <section class="dashboard">
      <section id="hero-shell" class="hero-shell" hidden>
        <section id="hero" class="hero" hidden>
          <div class="hero-main">
            <div class="hero-copy">
              <div class="place" id="place-name"></div>
              <div class="condition" id="hero-condition"></div>
              <div class="hilo">
                <span id="hero-feels"></span>
                <span id="hero-comfort" class="comfort-face" role="img" hidden></span> &middot;
                <span id="hero-hi"></span> / <span id="hero-lo"></span>
              </div>
              <button id="refresh-btn" class="refresh" type="button"
                      aria-label="Refresh weather" hidden>
                <svg class="refresh-icon" viewBox="0 0 24 24" aria-hidden="true"><use href="#icon-refresh"></use></svg>
                <span id="updated-time"></span>
              </button>
            </div>
            <div class="now">
              <span id="hero-icon-slot"></span>
              <div class="temp" id="hero-temp"></div>
            </div>
          </div>
          <div class="hero-extra">
            <p class="nowcast" id="nowcast" hidden></p>
            <div class="daylight" id="daylight" hidden>
              <span class="daylight-end">
                <svg class="daylight-icon" viewBox="0 0 24 24" aria-hidden="true"><use href="#icon-sunrise"></use></svg>
                <span id="daylight-rise"></span>
              </span>
              <span class="daylight-track">
                <span class="daylight-fill" id="daylight-fill"></span>
                <span class="daylight-dot" id="daylight-dot"></span>
              </span>
              <span class="daylight-end">
                <span id="daylight-set"></span>
                <svg class="daylight-icon" viewBox="0 0 24 24" aria-hidden="true"><use href="#icon-sunset"></use></svg>
              </span>
            </div>
          </div>
        </section>
      </section>

      <section id="tiles-card" class="tiles" hidden>
        <div class="tile"><div class="tile-head"><svg class="tile-icon" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><use href="#icon-humidity"></use></svg><span class="tile-label">Humidity</span></div><span class="tile-value" id="t-humidity"></span></div>
        <div class="tile"><div class="tile-head"><svg class="tile-icon" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><use href="#icon-wind"></use></svg><span class="tile-label">Wind</span></div><span class="tile-value" id="t-wind"></span></div>
        <div class="tile"><div class="tile-head"><svg class="tile-icon" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><use href="#icon-uv"></use></svg><span class="tile-label">UV</span></div><span class="tile-value" id="t-uv"></span></div>
        <div class="tile"><div class="tile-head"><svg class="tile-icon" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><use href="#icon-pressure"></use></svg><span class="tile-label">Pressure</span></div><span class="tile-value" id="t-pressure"></span></div>
        <div class="tile"><div class="tile-head"><svg class="tile-icon" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><use href="#icon-golden"></use></svg><span class="tile-label">Golden Hour</span></div><span class="tile-value" id="t-golden"></span></div>
        <div class="tile"><div class="tile-head"><svg class="tile-icon" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><use href="#icon-moonphase"></use></svg><span class="tile-label">Moon</span></div><span class="tile-value" id="t-moon"></span></div>
        <div class="tile"><div class="tile-head"><svg class="tile-icon" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><use href="#icon-visibility"></use></svg><span class="tile-label">Visibility</span></div><span class="tile-value" id="t-visibility"></span></div>
        <div class="tile" hidden><div class="tile-head"><svg class="tile-icon" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><use href="#icon-aqi"></use></svg><span class="tile-label">Air Quality</span></div><span class="tile-value" id="t-aqi"></span></div>
      </section>
    </section>

    <section id="empty" class="empty card" hidden>
      <svg class="empty-icon" viewBox="0 0 24 24" aria-hidden="true"><use href="#icon-partly-day"></use></svg>
      <p>Search for a city or use your current location.</p>
    </section>

    <section class="forecast-grid">
      <section id="hourly-card" class="card hourly" hidden>
        <div class="card-head">
          <h2 class="sr-only">Hourly forecast</h2>
          <div class="seg" id="resolution-toggle" role="group" aria-label="Forecast resolution">
            <button class="seg-btn" type="button" data-resolution="1" aria-pressed="false">Hourly</button>
            <button class="seg-btn" type="button" data-resolution="3" aria-pressed="true">3-Hourly</button>
            <button class="seg-btn" type="button" data-resolution="6" aria-pressed="false">6-Hourly</button>
          </div>
          <div class="seg" id="metric-toggle" role="group" aria-label="Graph metric">
            <button class="seg-btn" type="button" data-metric="temp" aria-pressed="true">Temp</button>
            <button class="seg-btn" type="button" data-metric="precip" aria-pressed="false">Precip</button>
            <button class="seg-btn" type="button" data-metric="wind" aria-pressed="false">Wind</button>
            <button class="seg-btn" type="button" data-metric="humidity" aria-pressed="false">Humidity</button>
            <button class="seg-btn" type="button" data-metric="uv" aria-pressed="false">UV</button>
          </div>
        </div>
        <div id="day-note" class="day-note" hidden>
          <span id="day-note-label" class="day-note-label"></span>
          <button id="day-back-btn" class="day-back-btn" type="button">Back to next 24 h</button>
        </div>
        <p class="forecast-note" id="hourly-summary"></p>
        <div class="hourly-strip" id="hourly-strip"></div>
      </section>

      <section id="daily-card" class="card daily" hidden>
        <h2 class="card-title">7-Day</h2>
        <p class="forecast-note" id="daily-summary"></p>
        <div class="daily-list" id="daily-list"></div>
      </section>
    </section>

    <section id="radar-card" class="card radar" hidden>
      <div class="card-head">
        <h2 class="card-title">Radar</h2>
        <div class="radar-controls" id="radar-controls">
          <button id="radar-play" class="radar-play" type="button"
                  aria-label="Play radar animation" title="Play radar animation">▶</button>
          <input id="radar-scrub" class="radar-scrub" type="range"
                 min="0" max="0" value="0" step="1"
                 aria-label="Radar frame" disabled>
          <span id="radar-time" class="radar-time" aria-live="polite"></span>
        </div>
      </div>
      <div id="radar-map"></div>
    </section>
  </main>

  <div id="detail-tooltip" class="detail-tooltip" role="tooltip" hidden></div>

  <script type="module" src="app.js"></script>
</body>
</html>
